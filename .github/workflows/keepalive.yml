name: Keepalive ping

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /keepalive
        env:
          KEEPALIVE_URL: ${{ vars.KEEPALIVE_URL }}
        run: |
          if [ -z "$KEEPALIVE_URL" ]; then
            echo "KEEPALIVE_URL repo variable is not set" >&2
            exit 1
          fi
          curl --fail --silent --show-error \
               --max-time 30 \
               --retry 3 --retry-delay 5 --retry-connrefused \
               "$KEEPALIVE_URL"
